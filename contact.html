    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <title>Contact Us</title>
</head>

<body>
    <script src="script.js"></script>
    <header>
        <h1>Contact Us - LTS</h1>
    </header>
    <nav>
        <ul>
             <li>
                <a href="index.html">Home </a>
            </li>
            <li>
                <a href="index.html#about">About <abbr title="The taco shop">LTS</abbr></a>
            </li>
            <li>
                <a href="menu.html">Menu </a>
            </li>
           
            <li>
                <a href="hours.html">Working Hours</a>
            </li>
        </ul>
    </nav>
    <figure>
        <img src="tacoscloseup.jpg" alt="Tacos and Drinks" title="Tacos ready to eat!" width="500" height="300">
        <figcaption>
            Little taco shop with Tacos!
        </figcaption>
    </figure>
    <hr>
    <main>
        <section>
        <h2>Our Contact Form</h2>
        <form action="https://httpbin.org" method="get">
            <fieldset>
                <legend>Send us a message!</legend>
                <p><label for="name">Name:</label>
                <input type="text" name="name" id="name" placeholder="Your full name" required>
            </p>
                <p><label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="your@email.com" required>
            </p>
            <p><label for="phone">Phone (Optional):</label>
                <input type="tel" name="phone" id="phone" placeholder="123-456-7890">
            </p>
            <p>
                <label for="message">Your message:</label><br>
                <textarea name="message" id="message" cols="30" rows="10" placeholder="Tell us what you think about our tacos!" required></textarea>
            </p>
            </fieldset>
            <button type="submit">Send Message</button>
            <button type="reset">Clear Form</button>
        </form>
        </section>
        <section>
            <h2>Our Location</h2>
            <address>
                555 Taco Temptation lane,suite T <br>
                kansas City,MO 5555-5555
                <br><br>
                Phone: <a href="tel:+55555555">5555-5555</a>
            </address>
        </section>
    </main>
    <hr>
    <footer>
        All Rights reserver for &copy;The Taco shop
    </footer>
</body>
